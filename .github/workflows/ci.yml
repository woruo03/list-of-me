name: CI

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous Windows bundles
        shell: pwsh
        run: |
          $bundlePath = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          if (Test-Path $bundlePath) {
            Remove-Item -Recurse -Force $bundlePath
          }

      - name: Build Tauri (Windows)
        env:
          SQLITE3_STATIC: 1
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/**/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/**/*.exe
          retention-days: 7
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            mold \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            fuse3 \
            patchelf \
            curl
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Download linuxdeploy
        run: |
          curl -L -o /tmp/linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o /tmp/linuxdeploy-plugin-appimage.AppImage https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x /tmp/linuxdeploy.AppImage /tmp/linuxdeploy-plugin-appimage.AppImage

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous Linux bundles
        run: |
          rm -rf src-tauri/target/x86_64-unknown-linux-gnu/release/bundle

      - name: Build Tauri (Linux)
        env:
          LINUXDEPLOY: /tmp/linuxdeploy.AppImage
          LINUXDEPLOY_PLUGIN_APPIMAGE: /tmp/linuxdeploy-plugin-appimage.AppImage
          APPIMAGE_EXTRACT_AND_RUN: 1
          SQLITE3_STATIC: 1
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/**/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/**/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/**/*.AppImage
          retention-days: 7
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-linux]
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          TAG="${{ steps.release_tag.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: windows-artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: linux-artifacts

      - name: Generate latest.json with Windows signature support
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG_NAME="${{ steps.release_tag.outputs.tag }}"
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is missing"
            exit 1
          fi

          sign_and_get_signature() {
            local file_path="$1"
            local sig_file="${file_path}.sig"
            pnpm tauri signer sign "$file_path" >/dev/null
            if [ ! -f "$sig_file" ]; then
              echo "Signature file not found: $sig_file"
              exit 1
            fi
            local sig
            sig=$(tr -d '\r\n' < "$sig_file")
            if [ -z "$sig" ]; then
              echo "Empty signature for: $file_path"
              exit 1
            fi
            echo "$sig"
          }
          
          # Linux AppImage
          APPIMAGE_PATH=$(find linux-artifacts -path "*/appimage/*_${VERSION}_*.AppImage" -type f | head -n 1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "AppImage not found for version ${VERSION}"
            exit 1
          fi
          APPIMAGE_SIGNATURE=$(sign_and_get_signature "$APPIMAGE_PATH")
          APPIMAGE_FILE_NAME=$(basename "$APPIMAGE_PATH")
          APPIMAGE_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${APPIMAGE_FILE_NAME}"
          export APPIMAGE_SIGNATURE APPIMAGE_DOWNLOAD_URL
          
          # Windows MSI
          MSI_PATH=$(find windows-artifacts -name "*_${VERSION}_*.msi" -type f | head -n 1)
          if [ -z "$MSI_PATH" ]; then
            echo "MSI not found for version ${VERSION}"
            exit 1
          fi
          MSI_SIGNATURE=$(sign_and_get_signature "$MSI_PATH")
          MSI_FILE_NAME=$(basename "$MSI_PATH")
          MSI_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${MSI_FILE_NAME}"
          export MSI_SIGNATURE MSI_DOWNLOAD_URL
          
          # Windows EXE
          EXE_PATH=$(find windows-artifacts -name "*_${VERSION}_*.exe" -type f | head -n 1)
          if [ -z "$EXE_PATH" ]; then
            echo "EXE not found for version ${VERSION}"
            exit 1
          fi
          EXE_SIGNATURE=$(sign_and_get_signature "$EXE_PATH")
          EXE_FILE_NAME=$(basename "$EXE_PATH")
          EXE_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${EXE_FILE_NAME}"
          export EXE_SIGNATURE EXE_DOWNLOAD_URL
          
          export VERSION PUB_DATE
          python3 - <<'PY'
          import json
          import os
          
          platforms = {}
          
          # Linux platform
          if "APPIMAGE_DOWNLOAD_URL" in os.environ:
              platforms["linux-x86_64"] = {
                  "signature": os.environ.get("APPIMAGE_SIGNATURE", ""),
                  "url": os.environ["APPIMAGE_DOWNLOAD_URL"],
              }
          
          # Windows platforms
          windows_signature = os.environ.get("MSI_SIGNATURE") or os.environ.get("EXE_SIGNATURE")
          windows_url = os.environ.get("MSI_DOWNLOAD_URL") or os.environ.get("EXE_DOWNLOAD_URL")
          
          if windows_url:
              platforms["windows-x86_64"] = {
                  "signature": windows_signature or "",
                  "url": windows_url,
              }
          
          data = {
              "version": os.environ["VERSION"],
              "notes": "",
              "pub_date": os.environ["PUB_DATE"],
              "platforms": platforms,
          }
          
          with open("latest.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY

      - name: Collect version-matched release assets
        run: |
          TAG_NAME="${{ steps.release_tag.outputs.tag }}"
          VERSION="${TAG_NAME#v}"
          mkdir -p release-assets

          find linux-artifacts -type f -name "*_${VERSION}_*.deb" -exec cp {} release-assets/ \;
          find linux-artifacts -type f -name "*-${VERSION}-*.rpm" -exec cp {} release-assets/ \;
          find linux-artifacts -type f -name "*_${VERSION}_*.AppImage" -exec cp {} release-assets/ \;
          find windows-artifacts -type f -name "*_${VERSION}_*.msi" -exec cp {} release-assets/ \;
          find windows-artifacts -type f -name "*_${VERSION}_*.exe" -exec cp {} release-assets/ \;
          cp latest.json release-assets/

          ls -lah release-assets

      - name: Validate version-matched assets
        run: |
          TAG_NAME="${{ steps.release_tag.outputs.tag }}"
          VERSION="${TAG_NAME#v}"
          MATCHED_COUNT=$(find release-assets -maxdepth 1 -type f \( \
            -name "*_${VERSION}_*.deb" -o \
            -name "*-${VERSION}-*.rpm" -o \
            -name "*_${VERSION}_*.AppImage" -o \
            -name "*_${VERSION}_*.msi" -o \
            -name "*_${VERSION}_*.exe" \
          \) | wc -l)
          if [ "$MATCHED_COUNT" -eq 0 ]; then
            echo "No release assets found for version ${VERSION}"
            exit 1
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/*
          draft: false
          prerelease: false
