name: CI

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-build:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        env:
          SQLITE3_STATIC: 1
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [windows-build]
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists (manual only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags
          TAG="${{ steps.release_tag.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            mold \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            fuse3 \
            patchelf \
            curl
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install linuxdeploy
        run: |
          mkdir -p /tmp/linuxdeploy
          curl -L -o /tmp/linuxdeploy/linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o /tmp/linuxdeploy/linuxdeploy-plugin-appimage.AppImage https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          curl -L -o /tmp/linuxdeploy/linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          curl -L -o /tmp/linuxdeploy/linuxdeploy-plugin-gstreamer.sh https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh
          chmod +x /tmp/linuxdeploy/linuxdeploy.AppImage \
            /tmp/linuxdeploy/linuxdeploy-plugin-appimage.AppImage \
            /tmp/linuxdeploy/linuxdeploy-plugin-gtk.sh \
            /tmp/linuxdeploy/linuxdeploy-plugin-gstreamer.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (bundles)
        env:
          LINUXDEPLOY: /tmp/linuxdeploy/linuxdeploy.AppImage
          LINUXDEPLOY_PLUGIN_APPIMAGE: /tmp/linuxdeploy/linuxdeploy-plugin-appimage.AppImage
          LINUXDEPLOY_PLUGIN_GTK: /tmp/linuxdeploy/linuxdeploy-plugin-gtk.sh
          LINUXDEPLOY_PLUGIN_GSTREAMER: /tmp/linuxdeploy/linuxdeploy-plugin-gstreamer.sh
          APPIMAGE_EXTRACT_AND_RUN: 1
          SQLITE3_STATIC: 1
        run: pnpm tauri build

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: windows-artifacts

      - name: Generate latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG_NAME="${{ steps.release_tag.outputs.tag }}"
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Linux AppImage
          APPIMAGE_PATH=$(find src-tauri/target -path "*/release/bundle/appimage/*.AppImage" -type f | head -n 1)
          if [ -n "$APPIMAGE_PATH" ]; then
            APPIMAGE_SIGNATURE=$(pnpm tauri signer sign "$APPIMAGE_PATH" | tr -d '\n')
            APPIMAGE_FILE_NAME=$(basename "$APPIMAGE_PATH")
            APPIMAGE_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${APPIMAGE_FILE_NAME}"
            export APPIMAGE_SIGNATURE APPIMAGE_DOWNLOAD_URL
          fi
          
          # Windows MSI
          MSI_PATH=$(find windows-artifacts -name "*.msi" -type f | head -n 1)
          if [ -n "$MSI_PATH" ]; then
            MSI_FILE_NAME=$(basename "$MSI_PATH")
            MSI_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${MSI_FILE_NAME}"
            export MSI_DOWNLOAD_URL
          fi
          
          # Windows EXE
          EXE_PATH=$(find windows-artifacts -name "*.exe" -type f | head -n 1)
          if [ -n "$EXE_PATH" ]; then
            EXE_FILE_NAME=$(basename "$EXE_PATH")
            EXE_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${EXE_FILE_NAME}"
            export EXE_DOWNLOAD_URL
          fi
          
          export VERSION PUB_DATE
          python - <<'PY'
          import json
          import os

          platforms = {}
          
          # Linux platform
          if "APPIMAGE_DOWNLOAD_URL" in os.environ:
              platforms["linux-x86_64"] = {
                  "signature": os.environ["APPIMAGE_SIGNATURE"],
                  "url": os.environ["APPIMAGE_DOWNLOAD_URL"],
              }
          
          # Windows platforms
          if "MSI_DOWNLOAD_URL" in os.environ:
              platforms["windows-x86_64"] = {
                  "url": os.environ["MSI_DOWNLOAD_URL"],
              }
          elif "EXE_DOWNLOAD_URL" in os.environ:
              platforms["windows-x86_64"] = {
                  "url": os.environ["EXE_DOWNLOAD_URL"],
              }
          
          data = {
              "version": os.environ["VERSION"],
              "notes": "",
              "pub_date": os.environ["PUB_DATE"],
              "platforms": platforms,
          }

          with open("latest.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          PY

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/rpm/*.rpm
            src-tauri/target/*/release/bundle/appimage/*.AppImage
            windows-artifacts/*.msi
            windows-artifacts/*.exe
            latest.json
