[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
]

[profile.dev]
opt-level = 0
incremental = true
lto = false
codegen-units = 256    # 开发模式可以拉满，编译更快
panic = "unwind"

[profile.release]
opt-level = 3
lto = "thin"           # Thin LTO 是目前的最佳实践，性能极佳且兼容性好
codegen-units = 1      # 配合 LTO 进行最高质量的代码生成
panic = "abort"
strip = "debuginfo"
incremental = true
